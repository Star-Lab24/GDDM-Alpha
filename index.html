<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>Delícias do Milho</title>


    <!-- Fonte -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">


    <!-- CSS -->
    <link rel="stylesheet" href="style.css">


</head>


<body>



<!-- BOTÃO MOBILE -->

<button class="mobile-btn" id="mobileBtn">

    ☰

</button>




<!-- MENU LATERAL -->

<aside class="sidebar" id="sidebar">


    <div class="logo">


        <span class="logo-icon">
            🌽
        </span>


        <h2>
            Delícias do Milho
        </h2>


    </div>




    <nav>


        <button 
        class="menu-item active"
        data-page="dashboard">

            🏠 Dashboard

        </button>




        <button 
        class="menu-item"
        data-page="produtos">

            📦 Produtos

        </button>




        <button 
        class="menu-item"
        data-page="vendas">

            💰 Vendas

        </button>




        <button 
        class="menu-item"
        data-page="fechamento">

            📝 Fechamento

        </button>




        <button 
        class="menu-item"
        data-page="historico">

            📄 Histórico

        </button>




        <button 
        class="menu-item"
        data-page="configuracoes">

            ⚙ Configurações

        </button>



    </nav>



</aside>






<!-- CONTEÚDO PRINCIPAL -->


<main class="content">



    <header class="topbar">



        <div>


            <h1 id="page-title">

                Dashboard

            </h1>



            <p id="page-description">

                Bem-vindo ao sistema.

            </p>



        </div>




        <div class="date">


            📅

            <span id="dataAtual"></span>



        </div>



    </header>





    <section id="app">


    </section>





</main>





<script src="script.js"></script>



<script>


// MENU MOBILE

const mobileBtn =
document.getElementById("mobileBtn");


const sidebar =
document.getElementById("sidebar");



mobileBtn.onclick = ()=>{


    sidebar.classList.toggle("open");


};




// fechar menu ao clicar

document.querySelectorAll(".menu-item")
.forEach(botao=>{


    botao.onclick=()=>{


        sidebar.classList.remove("open");


    }


});



</script>



</body>


</html>
